services:
  api:
    build:
      context: ./src/AxionisPos.Api
      dockerfile: Dockerfile
    container_name: axionis-local-api
    volumes:
      - ./data:/app/data
    ports:
      - "5288:8080"
    environment:
      TZ: Africa/Johannesburg
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Data Source=/app/data/axionis.db
      App__PdfStoragePath: /app/data/pdfs
      App__BrandingStoragePath: /app/data/branding
      App__PublicBaseUrl: http://localhost:5173
      Jwt__Key: ${JWT_KEY:-nf9TrSMIYib6J21xAUhkGmWXpOwjPdlE507cq8uC3ZFQgaRD}
      Jwt__Issuer: AxionisPos
      Jwt__Audience: AxionisPos
      Seed__OwnerEmail: ${OWNER_EMAIL:-admin@example.com}
      Seed__OwnerPassword: ${OWNER_PASSWORD:-ChangeMe2026!}
